openapi: 3.1.0
info:
  title: MoneyTree Contracts API
  version: 0.1.0
servers:
  - url: https://api.moneytree.local
paths:
  /health:
    get:
      summary: Health check endpoint
      operationId: getHealth
      responses:
        '200':
          description: Successful health response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/mortgages:
    get:
      summary: List current user mortgages
      operationId: listMortgages
      responses:
        '200':
          description: Mortgages available to the authenticated user
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Mortgage'
                required:
                  - data
    post:
      summary: Create a mortgage
      operationId: createMortgage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMortgageRequest'
      responses:
        '201':
          description: Mortgage created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Mortgage'
                required:
                  - data

  /api/mortgages/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    get:
      summary: Fetch a mortgage by id
      operationId: getMortgage
      responses:
        '200':
          description: Mortgage found
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Mortgage'
                required:
                  - data
        '404':
          description: Mortgage not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Update a mortgage
      operationId: updateMortgage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMortgageRequest'
      responses:
        '200':
          description: Mortgage updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Mortgage'
                required:
                  - data
        '404':
          description: Mortgage not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete a mortgage
      operationId: deleteMortgage
      responses:
        '204':
          description: Mortgage deleted
        '404':
          description: Mortgage not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/ai/settings:
    get:
      summary: Get AI settings for the authenticated user
      operationId: getAiSettings
      responses:
        '200':
          description: AI settings payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AiSettings'
                required:
                  - data
    put:
      summary: Update AI settings for the authenticated user
      operationId: updateAiSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAiSettingsRequest'
      responses:
        '200':
          description: Updated AI settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AiSettings'
                required:
                  - data

  /api/ai/test-connection:
    post:
      summary: Test AI provider connectivity
      operationId: testAiConnection
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                settings:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Connectivity test result
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AiConnectionResult'
                required:
                  - data

  /api/ai/models:
    get:
      summary: List available AI models from the configured provider
      operationId: listAiModels
      responses:
        '200':
          description: Available model names
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      models:
                        type: array
                        items:
                          type: string
                    required:
                      - models
                required:
                  - data

  /api/ai/categorization-runs:
    post:
      summary: Create an AI categorization run
      operationId: createAiCategorizationRun
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                limit:
                  type: integer
      responses:
        '201':
          description: Categorization run created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AiSuggestionRun'
                required:
                  - data

  /api/ai/import-categorization-runs:
    post:
      summary: Create an AI import-row categorization run
      operationId: createAiImportCategorizationRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - batch_id
              properties:
                batch_id:
                  type: string
                limit:
                  type: integer
      responses:
        '201':
          description: Import categorization run created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AiSuggestionRun'
                required:
                  - data

  /api/ai/suggestion-runs:
    get:
      summary: List AI suggestion runs
      operationId: listAiSuggestionRuns
      responses:
        '200':
          description: AI suggestion runs
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AiSuggestionRun'
                required:
                  - data

  /api/ai/suggestions:
    get:
      summary: List AI suggestions
      operationId: listAiSuggestions
      responses:
        '200':
          description: AI suggestions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AiSuggestion'
                required:
                  - data

  /api/ai/suggestions/{id}/accept:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    post:
      summary: Accept and apply an AI suggestion
      operationId: acceptAiSuggestion
      responses:
        '200':
          description: Accepted AI suggestion
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AiSuggestion'
                required:
                  - data

  /api/ai/suggestions/{id}/reject:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    post:
      summary: Reject an AI suggestion
      operationId: rejectAiSuggestion
      responses:
        '200':
          description: Rejected AI suggestion
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AiSuggestion'
                required:
                  - data

  /api/ai/suggestions/{id}/apply-edited:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    post:
      summary: Apply an edited AI suggestion payload
      operationId: applyEditedAiSuggestion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                payload:
                  type: object
                  additionalProperties: true
              required:
                - payload
      responses:
        '200':
          description: Updated AI suggestion
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AiSuggestion'
                required:
                  - data

components:
  schemas:
    HealthResponse:
      type: object
      description: Application health metadata
      properties:
        status:
          type: string
          description: Current service status
          enum:
            - healthy
            - degraded
            - down
        timestamp:
          type: string
          format: date-time
          description: Time the health snapshot was produced
      required:
        - status
        - timestamp

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    MortgageEscrowProfile:
      type: object
      properties:
        id:
          type: string
        property_tax_monthly:
          type: string
        homeowners_insurance_monthly:
          type: string
        flood_insurance_monthly:
          type: string
        other_escrow_monthly:
          type: string
        escrow_cushion_months:
          type: string
        expected_old_escrow_refund:
          type: string
        annual_tax_growth_rate:
          type: string
        annual_insurance_growth_rate:
          type: string
        source:
          type: string
        confidence_score:
          type: string
        inserted_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Mortgage:
      type: object
      properties:
        id:
          type: string
        nickname:
          type: string
        property_name:
          type: string
        street_line_1:
          type: string
        street_line_2:
          type: string
        city:
          type: string
        state_region:
          type: string
        postal_code:
          type: string
        country_code:
          type: string
        occupancy_type:
          type: string
        loan_type:
          type: string
        servicer_name:
          type: string
        lender_name:
          type: string
        original_loan_amount:
          type: string
        current_balance:
          type: string
        original_interest_rate:
          type: string
        current_interest_rate:
          type: string
        original_term_months:
          type: integer
        remaining_term_months:
          type: integer
        monthly_principal_interest:
          type: string
        monthly_payment_total:
          type: string
        home_value_estimate:
          type: string
        pmi_mip_monthly:
          type: string
        hoa_monthly:
          type: string
        flood_insurance_monthly:
          type: string
        has_escrow:
          type: boolean
        escrow_included_in_payment:
          type: boolean
        linked_obligation_id:
          type: string
        status:
          type: string
        source:
          type: string
        last_reviewed_at:
          type: string
          format: date-time
        escrow_profile:
          oneOf:
            - $ref: '#/components/schemas/MortgageEscrowProfile'
            - type: 'null'
        inserted_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - property_name
        - loan_type
        - current_balance
        - current_interest_rate
        - remaining_term_months
        - monthly_payment_total
        - has_escrow
        - escrow_included_in_payment
        - status

    MortgageEscrowProfileInput:
      type: object
      properties:
        property_tax_monthly:
          type: string
        homeowners_insurance_monthly:
          type: string
        flood_insurance_monthly:
          type: string
        other_escrow_monthly:
          type: string
        escrow_cushion_months:
          type: string
        expected_old_escrow_refund:
          type: string
        annual_tax_growth_rate:
          type: string
        annual_insurance_growth_rate:
          type: string
        source:
          type: string
        confidence_score:
          type: string

    CreateMortgageRequest:
      type: object
      properties:
        nickname:
          type: string
        property_name:
          type: string
        street_line_1:
          type: string
        street_line_2:
          type: string
        city:
          type: string
        state_region:
          type: string
        postal_code:
          type: string
        country_code:
          type: string
        occupancy_type:
          type: string
        loan_type:
          type: string
        servicer_name:
          type: string
        lender_name:
          type: string
        original_loan_amount:
          type: string
        current_balance:
          type: string
        original_interest_rate:
          type: string
        current_interest_rate:
          type: string
        original_term_months:
          type: integer
        remaining_term_months:
          type: integer
        monthly_principal_interest:
          type: string
        monthly_payment_total:
          type: string
        home_value_estimate:
          type: string
        pmi_mip_monthly:
          type: string
        hoa_monthly:
          type: string
        flood_insurance_monthly:
          type: string
        has_escrow:
          type: boolean
        escrow_included_in_payment:
          type: boolean
        linked_obligation_id:
          type: string
        status:
          type: string
        source:
          type: string
        last_reviewed_at:
          type: string
          format: date-time
        escrow_profile:
          $ref: '#/components/schemas/MortgageEscrowProfileInput'
      required:
        - property_name
        - loan_type
        - current_balance
        - current_interest_rate
        - remaining_term_months
        - monthly_payment_total

    UpdateMortgageRequest:
      allOf:
        - $ref: '#/components/schemas/CreateMortgageRequest'

    AiSettings:
      type: object
      properties:
        enabled_globally:
          type: boolean
        require_confirmation:
          type: boolean
        local_ai_enabled:
          type: boolean
        provider:
          type: string
        ollama_base_url:
          type: string
        default_model:
          type: string
        allow_ai_for_categorization:
          type: boolean
        allow_ai_for_budget_recommendations:
          type: boolean
        allow_ai_pattern_detection:
          type: boolean
        store_prompt_debug_data:
          type: boolean

    UpdateAiSettingsRequest:
      type: object
      properties:
        settings:
          type: object
          properties:
            local_ai_enabled:
              type: boolean
            provider:
              type: string
            ollama_base_url:
              type: string
            default_model:
              type: string
            allow_ai_for_categorization:
              type: boolean
            allow_ai_for_budget_recommendations:
              type: boolean
            allow_ai_pattern_detection:
              type: boolean
            store_prompt_debug_data:
              type: boolean
      required:
        - settings

    AiConnectionResult:
      type: object
      properties:
        provider:
          type: string
        base_url:
          type: string
        model:
          type: string
        model_available:
          type: boolean
        models:
          type: array
          items:
            type: string

    AiSuggestionRun:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        provider:
          type: string
        model:
          type: string
        feature:
          type: string
        status:
          type: string
        input_scope:
          type: object
          additionalProperties: true
        prompt_version:
          type: string
        schema_version:
          type: string
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        duration_ms:
          type: integer
        error_code:
          type: string
        error_message_safe:
          type: string
        inserted_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AiSuggestion:
      type: object
      properties:
        id:
          type: string
        ai_suggestion_run_id:
          type: string
        user_id:
          type: string
        target_type:
          type: string
        target_id:
          type: string
        suggestion_type:
          type: string
        payload:
          type: object
          additionalProperties: true
        approved_payload:
          type: object
          additionalProperties: true
        confidence:
          type: string
        reason:
          type: string
        evidence:
          type: object
          additionalProperties: true
        status:
          type: string
        reviewed_by_user_id:
          type: string
        reviewed_at:
          type: string
          format: date-time
        applied_at:
          type: string
          format: date-time
        inserted_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
