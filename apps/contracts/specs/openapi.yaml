openapi: 3.1.0
info:
  title: MoneyTree Contracts API
  version: 0.1.0
servers:
  - url: https://api.moneytree.local
paths:
  /health:
    get:
      summary: Health check endpoint
      operationId: getHealth
      responses:
        '200':
          description: Successful health response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/mortgages:
    get:
      summary: List current user mortgages
      operationId: listMortgages
      responses:
        '200':
          description: Mortgages available to the authenticated user
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Mortgage'
                required:
                  - data
    post:
      summary: Create a mortgage
      operationId: createMortgage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMortgageRequest'
      responses:
        '201':
          description: Mortgage created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Mortgage'
                required:
                  - data

  /api/mortgages/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    get:
      summary: Fetch a mortgage by id
      operationId: getMortgage
      responses:
        '200':
          description: Mortgage found
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Mortgage'
                required:
                  - data
        '404':
          description: Mortgage not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Update a mortgage
      operationId: updateMortgage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMortgageRequest'
      responses:
        '200':
          description: Mortgage updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Mortgage'
                required:
                  - data
        '404':
          description: Mortgage not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete a mortgage
      operationId: deleteMortgage
      responses:
        '204':
          description: Mortgage deleted
        '404':
          description: Mortgage not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/loans/{loan_id}/refinance_scenarios:
    parameters:
      - in: path
        name: loan_id
        required: true
        schema:
          type: string
    get:
      summary: List refinance scenarios for a mortgage-backed loan
      operationId: listRefinanceScenarios
      responses:
        '200':
          description: Refinance scenarios for the loan
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/RefinanceScenario'
                required:
                  - data
    post:
      summary: Create a refinance scenario for a mortgage-backed loan
      operationId: createRefinanceScenario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRefinanceScenarioRequest'
      responses:
        '201':
          description: Refinance scenario created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/RefinanceScenario'
                required:
                  - data
        '404':
          description: Loan not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/refinance_scenarios/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    get:
      summary: Fetch a refinance scenario by id
      operationId: getRefinanceScenario
      responses:
        '200':
          description: Refinance scenario found
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/RefinanceScenario'
                required:
                  - data
        '404':
          description: Refinance scenario not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Update a refinance scenario
      operationId: updateRefinanceScenario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRefinanceScenarioRequest'
      responses:
        '200':
          description: Refinance scenario updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/RefinanceScenario'
                required:
                  - data
        '404':
          description: Refinance scenario not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete a refinance scenario
      operationId: deleteRefinanceScenario
      responses:
        '204':
          description: Refinance scenario deleted
        '404':
          description: Refinance scenario not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/refinance_scenarios/{id}/fee_items:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    post:
      summary: Add a refinance scenario fee item
      operationId: createRefinanceFeeItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRefinanceFeeItemRequest'
      responses:
        '201':
          description: Fee item created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/RefinanceFeeItem'
                required:
                  - data

  /api/refinance_scenarios/{id}/analyze:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    post:
      summary: Run deterministic refinance analysis for a scenario
      operationId: analyzeRefinanceScenario
      responses:
        '201':
          description: Analysis snapshot created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/RefinanceAnalysisResult'
                required:
                  - data
        '404':
          description: Refinance scenario not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/loans/{loan_id}/documents:
    parameters:
      - in: path
        name: loan_id
        required: true
        schema:
          type: string
    get:
      summary: List document metadata for a mortgage-backed loan
      operationId: listLoanDocuments
      responses:
        '200':
          description: Loan documents for the loan
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/LoanDocument'
                required:
                  - data
    post:
      summary: Create document metadata for a mortgage-backed loan
      operationId: createLoanDocument
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLoanDocumentRequest'
      responses:
        '201':
          description: Loan document metadata created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/LoanDocument'
                required:
                  - data
        '404':
          description: Loan not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/loan_documents/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    get:
      summary: Fetch a loan document by id
      operationId: getLoanDocument
      responses:
        '200':
          description: Loan document found
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/LoanDocument'
                required:
                  - data
        '404':
          description: Loan document not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/loan_documents/{id}/extract:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    post:
      summary: Create a reviewable extraction candidate for a loan document
      operationId: createLoanDocumentExtraction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLoanDocumentExtractionRequest'
      responses:
        '201':
          description: Extraction candidate created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/LoanDocumentExtraction'
                required:
                  - data
        '404':
          description: Loan document not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/loan_document_extractions/{id}/confirm:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    post:
      summary: Confirm a reviewed loan document extraction candidate
      operationId: confirmLoanDocumentExtraction
      responses:
        '200':
          description: Extraction candidate confirmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/LoanDocumentExtraction'
                required:
                  - data
        '404':
          description: Loan document extraction not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/loan_document_extractions/{id}/reject:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    post:
      summary: Reject a reviewed loan document extraction candidate
      operationId: rejectLoanDocumentExtraction
      responses:
        '200':
          description: Extraction candidate rejected
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/LoanDocumentExtraction'
                required:
                  - data
        '404':
          description: Loan document extraction not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/loan_document_extractions/{id}/apply:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    post:
      summary: Apply a confirmed extraction candidate to the mortgage baseline
      operationId: applyLoanDocumentExtraction
      responses:
        '200':
          description: Confirmed extraction applied to the mortgage baseline
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/LoanDocumentApplyResult'
                required:
                  - data
        '404':
          description: Loan document extraction not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Extraction cannot be applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/loan_document_extractions/{id}/create_lender_quote:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    post:
      summary: Create a lender quote from a confirmed extraction candidate
      operationId: createLenderQuoteFromLoanDocumentExtraction
      responses:
        '201':
          description: Lender quote created from confirmed extraction fields
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/LenderQuote'
                required:
                  - data
        '404':
          description: Loan document extraction not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Extraction cannot create a lender quote
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/loan_document_extractions/{id}/create_scenario:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    post:
      summary: Create a refinance scenario from a confirmed extraction candidate
      operationId: createRefinanceScenarioFromLoanDocumentExtraction
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                new_principal_amount:
                  type: string
                status:
                  type: string
      responses:
        '201':
          description: Refinance scenario created from confirmed extraction fields
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/RefinanceScenario'
                required:
                  - data
        '404':
          description: Loan document extraction not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Extraction cannot create a refinance scenario
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/loans/{loan_id}/lender_quotes:
    parameters:
      - in: path
        name: loan_id
        required: true
        schema:
          type: string
    get:
      summary: List lender quotes for a mortgage-backed loan
      operationId: listLenderQuotes
      responses:
        '200':
          description: Lender quotes for the loan
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/LenderQuote'
                required:
                  - data
    post:
      summary: Create a lender quote for a mortgage-backed loan
      operationId: createLenderQuote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLenderQuoteRequest'
      responses:
        '201':
          description: Lender quote created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/LenderQuote'
                required:
                  - data
        '404':
          description: Loan not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/lender_quotes/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    get:
      summary: Get a lender quote
      operationId: getLenderQuote
      responses:
        '200':
          description: Lender quote
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/LenderQuote'
                required:
                  - data
        '404':
          description: Lender quote not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Update a lender quote
      operationId: updateLenderQuote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLenderQuoteRequest'
      responses:
        '200':
          description: Lender quote updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/LenderQuote'
                required:
                  - data
        '404':
          description: Lender quote not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/lender_quotes/{id}/convert:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    post:
      summary: Convert a lender quote into a draft refinance scenario
      operationId: convertLenderQuoteToScenario
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConvertLenderQuoteRequest'
      responses:
        '201':
          description: Refinance scenario created from lender quote
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/RefinanceScenario'
                required:
                  - data
        '404':
          description: Lender quote not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/loans/{loan_id}/alert_rules:
    parameters:
      - in: path
        name: loan_id
        required: true
        schema:
          type: string
    get:
      summary: List Loan Center alert rules
      operationId: listLoanAlertRules
      responses:
        '200':
          description: Loan alert rules
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/LoanAlertRule'
                required:
                  - data
    post:
      summary: Create a Loan Center alert rule
      operationId: createLoanAlertRule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLoanAlertRuleRequest'
      responses:
        '201':
          description: Loan alert rule created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/LoanAlertRule'
                required:
                  - data
        '404':
          description: Loan not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/loans/{loan_id}/alert_rules/evaluate:
    parameters:
      - in: path
        name: loan_id
        required: true
        schema:
          type: string
    post:
      summary: Evaluate Loan Center alert rules for a loan
      operationId: evaluateLoanAlertRules
      responses:
        '200':
          description: Alert evaluation summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      evaluated:
                        type: integer
                      triggered:
                        type: integer
                    required:
                      - evaluated
                      - triggered
                required:
                  - data

  /api/loan_alert_rules/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    put:
      summary: Update a Loan Center alert rule
      operationId: updateLoanAlertRule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLoanAlertRuleRequest'
      responses:
        '200':
          description: Loan alert rule updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/LoanAlertRule'
                required:
                  - data
        '404':
          description: Loan alert rule not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete a Loan Center alert rule
      operationId: deleteLoanAlertRule
      responses:
        '204':
          description: Loan alert rule deleted
        '404':
          description: Loan alert rule not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/loan_alert_rules/{id}/evaluate:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    post:
      summary: Evaluate one Loan Center alert rule
      operationId: evaluateLoanAlertRule
      responses:
        '200':
          description: Alert evaluation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      rule:
                        $ref: '#/components/schemas/LoanAlertRule'
                      triggered:
                        type: boolean
                    required:
                      - rule
                      - triggered
                required:
                  - data

  /api/ai/settings:
    get:
      summary: Get AI settings for the authenticated user
      operationId: getAiSettings
      responses:
        '200':
          description: AI settings payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AiSettings'
                required:
                  - data
    put:
      summary: Update AI settings for the authenticated user
      operationId: updateAiSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAiSettingsRequest'
      responses:
        '200':
          description: Updated AI settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AiSettings'
                required:
                  - data

  /api/ai/test-connection:
    post:
      summary: Test AI provider connectivity
      operationId: testAiConnection
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                settings:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Connectivity test result
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AiConnectionResult'
                required:
                  - data

  /api/ai/models:
    get:
      summary: List available AI models from the configured provider
      operationId: listAiModels
      responses:
        '200':
          description: Available model names
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      models:
                        type: array
                        items:
                          type: string
                    required:
                      - models
                required:
                  - data

  /api/ai/categorization-runs:
    post:
      summary: Create an AI categorization run
      operationId: createAiCategorizationRun
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                limit:
                  type: integer
      responses:
        '201':
          description: Categorization run created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AiSuggestionRun'
                required:
                  - data

  /api/ai/import-categorization-runs:
    post:
      summary: Create an AI import-row categorization run
      operationId: createAiImportCategorizationRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - batch_id
              properties:
                batch_id:
                  type: string
                limit:
                  type: integer
      responses:
        '201':
          description: Import categorization run created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AiSuggestionRun'
                required:
                  - data

  /api/ai/suggestion-runs:
    get:
      summary: List AI suggestion runs
      operationId: listAiSuggestionRuns
      responses:
        '200':
          description: AI suggestion runs
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AiSuggestionRun'
                required:
                  - data

  /api/ai/suggestions:
    get:
      summary: List AI suggestions
      operationId: listAiSuggestions
      responses:
        '200':
          description: AI suggestions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AiSuggestion'
                required:
                  - data

  /api/ai/suggestions/{id}/accept:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    post:
      summary: Accept and apply an AI suggestion
      operationId: acceptAiSuggestion
      responses:
        '200':
          description: Accepted AI suggestion
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AiSuggestion'
                required:
                  - data

  /api/ai/suggestions/{id}/reject:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    post:
      summary: Reject an AI suggestion
      operationId: rejectAiSuggestion
      responses:
        '200':
          description: Rejected AI suggestion
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AiSuggestion'
                required:
                  - data

  /api/ai/suggestions/{id}/apply-edited:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    post:
      summary: Apply an edited AI suggestion payload
      operationId: applyEditedAiSuggestion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                payload:
                  type: object
                  additionalProperties: true
              required:
                - payload
      responses:
        '200':
          description: Updated AI suggestion
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AiSuggestion'
                required:
                  - data

